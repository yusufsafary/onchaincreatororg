<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Base: deep charcoal -->
  <rect width="180" height="180" rx="36" fill="#0D0D0D"/>
  <!-- Outer arc ring: faint electric -->
  <path d="M36 90 A54 54 0 0 1 144 90" stroke="#E8F000" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.3"/>
  <!-- Mid arc ring: stronger -->
  <path d="M54 90 A36 36 0 0 1 126 90" stroke="#E8F000" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.65"/>
  <!-- Inner arc ring -->
  <path d="M70 90 A20 20 0 0 1 110 90" stroke="#E8F000" stroke-width="7" stroke-linecap="round" fill="none" opacity="0.9"/>
  <!-- Center node: creator dot -->
  <circle cx="90" cy="90" r="18" fill="#E8F000"/>
  <circle cx="90" cy="90" r="8" fill="#0D0D0D"/>
  <!-- Chain nodes: two anchor points -->
  <circle cx="42" cy="118" r="10" fill="#FF6B2B"/>
  <circle cx="138" cy="118" r="10" fill="#FF6B2B"/>
  <!-- Connector lines -->
  <line x1="52" y1="112" x2="80" y2="97" stroke="#FF6B2B" stroke-width="4" opacity="0.55"/>
  <line x1="128" y1="112" x2="100" y2="97" stroke="#FF6B2B" stroke-width="4" opacity="0.55"/>
</svg>