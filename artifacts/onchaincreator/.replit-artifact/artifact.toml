kind = "web"
previewPath = "/"
title = "OnchainCreator"
version = "1.0.0"
id = "artifacts/onchaincreator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24892

[services.development]
run = "pnpm --filter @workspace/onchaincreator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/onchaincreator", "run", "build" ]
publicDir = "artifacts/onchaincreator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24892"
BASE_PATH = "/"
